<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <match>
    <test name="lang" compare="contains">
      <string>fa</string>
    </test>
    <edit name="family" mode="prepend">
      <string>Vazirmatn</string>
      <string>Noto Sans Arabic</string>
    </edit>
  </match>

  <match>
    <test name="lang" compare="contains">
      <string>ar</string>
    </test>
    <edit name="family" mode="prepend">
      <string>Vazirmatn</string>
      <string>Noto Sans Arabic</string>
    </edit>
  </match>

</fontconfig>

